<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>募集案件一覧 | BUDDYON</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

:root {
  --bg: #09090f;
  --surface: #111118;
  --card: #16161f;
  --border: #24243a;
  --accent: #ff6b35;
  --accent-dim: rgba(255,107,53,.12);
  --accent-glow: rgba(255,107,53,.25);
  --text: #ebebf5;
  --muted: #64648a;
  --sub: #9898b8;
  --green: #06d6a0;
  --blue: #4cc9f0;
  --yellow: #ffd166;
  --chip-bg: #1e1e2e;
  --chip-active-border: rgba(255,107,53,.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===== HEADER ===== */
.hero {
  background: linear-gradient(160deg, #0f0f1e 0%, #0a0a14 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 400px; height: 200px;
  background: radial-gradient(ellipse, rgba(255,107,53,.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 20px;
  padding: 4px 12px;
  margin-bottom: 14px;
}

.hero-label span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.4s infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }

.hero h1 {
  font-size: clamp(22px, 5vw, 28px);
  font-weight: 900;
  line-height: 1.2;
  letter-spacing: -.01em;
}

.hero h1 em { color: var(--accent); font-style: normal; }

.hero p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: .06em;
}

/* ===== FILTER AREA ===== */
.filters {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.filter-row:last-child { margin-bottom: 0; }

.filter-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .08em;
  white-space: nowrap;
  min-width: 36px;
}

.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.chip {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--chip-bg);
  border: 1px solid var(--border);
  color: var(--sub);
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
  user-select: none;
}

.chip:hover { border-color: var(--accent-glow); color: var(--text); }

.chip.active {
  background: var(--accent-dim);
  border-color: var(--chip-active-border);
  color: var(--accent);
}

/* ===== COUNT ===== */
.count-bar {
  padding: 14px 16px 4px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .05em;
  max-width: 600px;
  margin: 0 auto;
}
.count-bar strong { color: var(--accent); font-weight: 700; }

/* ===== GRID ===== */
.grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px 16px 48px;
  max-width: 600px;
  margin: 0 auto;
}

/* ===== CARD ===== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px 16px;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  opacity: 0;
  transform: translateY(10px);
  animation: up .4s ease forwards;
}

.card:hover {
  border-color: rgba(255,107,53,.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}

@keyframes up {
  to { opacity:1; transform:translateY(0); }
}

.card.hidden { display: none; }

/* card top row */
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 13px;
}

.tags { display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; margin-top: 2px; }

.tag {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .05em;
  padding: 2px 7px;
  border-radius: 5px;
  white-space: nowrap;
}

.tag-spot  { background: rgba(255,209,102,.12); color: var(--yellow); border: 1px solid rgba(255,209,102,.3); }
.tag-fixed { background: rgba(76,201,240,.1);   color: var(--blue);   border: 1px solid rgba(76,201,240,.25); }
.tag-day   { background: rgba(255,107,53,.12);  color: var(--accent); border: 1px solid rgba(255,107,53,.3); }
.tag-month { background: rgba(76,201,240,.1);   color: var(--blue);   border: 1px solid rgba(76,201,240,.25); }
.tag-hour  { background: rgba(6,214,160,.1);    color: var(--green);  border: 1px solid rgba(6,214,160,.25); }
.tag-com   { background: rgba(168,85,247,.1);   color: #c084fc;       border: 1px solid rgba(168,85,247,.25); }
.tag-elec  { background: rgba(251,191,36,.1);   color: #fbbf24;       border: 1px solid rgba(251,191,36,.25); }

.card-title {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.45;
  flex: 1;
}

/* reward */
.reward {
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(115deg, rgba(255,107,53,.07), rgba(255,209,102,.04));
  border: 1px solid rgba(255,107,53,.16);
  border-radius: 10px;
  padding: 9px 14px;
  margin-bottom: 12px;
}

.reward-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--muted);
  white-space: nowrap;
}

.reward-value {
  font-size: 17px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -.01em;
}

/* meta */
.meta { display: flex; flex-wrap: wrap; gap: 10px; }

.meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: #a0a0c0;
}

.meta-item svg { width: 12px; height: 12px; opacity: .5; flex-shrink: 0; }

/* empty */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty p { font-size: 13px; margin-top: 8px; }

/* loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 80px 20px;
  color: var(--muted);
  font-size: 12px;
}
.dots { display: flex; gap: 5px; }
.dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s ease infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label"><span></span>LIVE OPENINGS</div>
  <h1>現在の<em>募集案件</em>一覧</h1>
  <p>BUDDYON — 最新の案件をご確認ください</p>
</div>

<div class="filters">
  <!-- 案件種別 -->
  <div class="filter-row">
    <span class="filter-label">種別</span>
    <div class="chips" id="filter-type">
      <div class="chip active" data-val="">すべて</div>
      <div class="chip" data-val="固定">📌 固定</div>
      <div class="chip" data-val="スポット">⚡ スポット</div>
    </div>
  </div>
  <!-- 単価種別 -->
  <div class="filter-row">
    <span class="filter-label">報酬</span>
    <div class="chips" id="filter-pay">
      <div class="chip active" data-val="">すべて</div>
      <div class="chip" data-val="日給">日給</div>
      <div class="chip" data-val="月給">月給</div>
      <div class="chip" data-val="時給">時給</div>
    </div>
  </div>
  <!-- 業種 -->
  <div class="filter-row">
    <span class="filter-label">業種</span>
    <div class="chips" id="filter-industry">
      <div class="chip active" data-val="">すべて</div>
      <div class="chip" data-val="通信">📱 通信</div>
      <div class="chip" data-val="家電">🏬 家電</div>
    </div>
  </div>
</div>

<div class="count-bar" id="count-bar"></div>

<div class="grid" id="grid">
  <div class="loading">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <span>読み込み中...</span>
  </div>
</div>

<script>
const SITE_ID = '19c4a8ac-36ed-410f-94f1-978ab08b87b1';
const API_KEY = 'IST.eyJraWQiOiJQb3pIX2FDMiIsImFsZyI6IlJTMjU2In0.eyJkYXRhIjoie1wiaWRcIjpcIjg0YTI5OGZlLWVkOGQtNGViZi05ZGQwLTg4ZGEzNzBiYWE5ZVwiLFwiaWRlbnRpdHlcIjp7XCJ0eXBlXCI6XCJhcHBsaWNhdGlvblwiLCJpZCI6IjU1NGRkOTJmLTRmNDQtNDVhYy05YzJhLTVmNGFiYWJiMDRhYiJ9LCJ0ZW5hbnQiOnsidHlwZSI6ImFjY291bnQiLCJpZCI6IjcxMGQ2NzBjLTA4ZDMtNGZkNC05ODZkLTA3Y2E2YjFlMDQ4MyJ9fSIsImlhdCI6MTc3NjEyMDQ4M30.R88s9NhqtMh3giAaQgnfvEwOoy-v6vySECSSOL2rOptb7S1JbyKZ0sWnNjzxtxp75CFEAwrjpycBDCBaX8VnQ7dATmLTl8UKd1xyn3-KwnYnwZWKDAnfhEgnBbYPk3oM4SwENpFsgGPwANwpLXHLhp_1WPecsOOk8fRQDsxCkqYkMHhlZ0pKPL6GV1ymPSMnt0wBWkVLEDbLYawucMkF4Tdl9mHHglEVauGXHVR2Kc8bi3S-VwzKh0ypJfvcmulzFkHONqVjtQZECuXpK1gLTMfSzE87HasxQpTOL-KAk8j2JRfxrPPrv17-XITtyja-LpJwg5_fqyzy5LjN-bKVAw';

let allItems = [];
let filters = { type: '', pay: '', industry: '' };

// フォーマット
function fmtReward(min, max, type) {
  const unit = type === '日給' ? '円／日' : type === '月給' ? '円／月' : '円／時';
  const n = v => v ? Number(v).toLocaleString('ja-JP') : null;
  if (!max && !min) return '要相談';
  if (!min || Number(min) === Number(max)) return n(max) + unit;
  return n(min) + '〜' + n(max) + unit;
}

function payClass(t) { return t === '日給' ? 'tag-day' : t === '月給' ? 'tag-month' : 'tag-hour'; }
function typeClass(t) { return t === 'スポット' ? 'tag-spot' : 'tag-fixed'; }
function indClass(i) { return i === '家電' ? 'tag-elec' : 'tag-com'; }

const locIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const calIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

function renderCards() {
  const grid = document.getElementById('grid');
  const countBar = document.getElementById('count-bar');

  const filtered = allItems.filter(item => {
    const d = item.data;
    if (filters.type && d.ankenType !== filters.type) return false;
    if (filters.pay  && d.tankaPriceType !== filters.pay) return false;
    if (filters.industry && d.industry !== filters.industry) return false;
    return true;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">😶 該当案件なし<p>フィルターを変更してみてください</p></div>`;
    countBar.innerHTML = '';
    return;
  }

  countBar.innerHTML = `<strong>${filtered.length}件</strong> 表示中`;

  grid.innerHTML = filtered.map((item, i) => {
    const d = item.data;
    const delay = i * 0.05;
    return `
<div class="card" style="animation-delay:${delay}s">
  <div class="card-top">
    <div class="tags">
      ${d.ankenType ? `<span class="tag ${typeClass(d.ankenType)}">${d.ankenType}</span>` : ''}
      ${d.tankaPriceType ? `<span class="tag ${payClass(d.tankaPriceType)}">${d.tankaPriceType}</span>` : ''}
      ${d.industry ? `<span class="tag ${indClass(d.industry)}">${d.industry}</span>` : ''}
    </div>
    <div class="card-title">${d.ankenName || '—'}</div>
  </div>
  <div class="reward">
    <span class="reward-label">報酬</span>
    <span class="reward-value">${fmtReward(d.tankaPriceMin, d.tankaPriceMax, d.tankaPriceType)}</span>
  </div>
  <div class="meta">
    <div class="meta-item">${locIcon}<span>${d.kinmuChi || '要相談'}</span></div>
    <div class="meta-item">${calIcon}<span>${d.kaishi || '随時'}</span></div>
  </div>
</div>`;
  }).join('');
}

// フィルターチップ
['filter-type', 'filter-pay', 'filter-industry'].forEach((id, idx) => {
  const key = ['type', 'pay', 'industry'][idx];
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll(`#${id} .chip`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filters[key] = chip.dataset.val;
    renderCards();
  });
});

// データ取得
fetch('https://www.wixapis.com/wix-data/v2/items/query', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'Authorization': API_KEY,
    'wix-site-id': SITE_ID
  },
  body: JSON.stringify({
    dataCollectionId: 'AnkenList',
    query: { paging: { limit: 100 } }
  })
})
.then(r => r.json())
.then(json => {
  allItems = json.dataItems || [];
  renderCards();
})
.catch(() => {
  document.getElementById('grid').innerHTML = '<div class="empty">⚠️ データを取得できませんでした</div>';
});
</script>
</body>
</html>
