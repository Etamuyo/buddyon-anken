<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>募集案件一覧 | BUDDYON</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
:root{--bg:#09090f;--surface:#111118;--card:#16161f;--border:#24243a;--accent:#ff6b35;--accent-dim:rgba(255,107,53,.12);--accent-glow:rgba(255,107,53,.25);--text:#ebebf5;--muted:#64648a;--sub:#9898b8;--green:#06d6a0;--blue:#4cc9f0;--yellow:#ffd166;--chip-bg:#1e1e2e;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hero{background:linear-gradient(160deg,#0f0f1e 0%,#0a0a14 100%);border-bottom:1px solid var(--border);padding:32px 20px 28px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:400px;height:200px;background:radial-gradient(ellipse,rgba(255,107,53,.08) 0%,transparent 70%);pointer-events:none;}
.hero-label{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:20px;padding:4px 12px;margin-bottom:14px;}
.hero-label span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.hero h1{font-size:clamp(22px,5vw,28px);font-weight:900;line-height:1.2;letter-spacing:-.01em;}
.hero h1 em{color:var(--accent);font-style:normal;}
.hero p{font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:.06em;}
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 16px 14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;white-space:nowrap;min-width:36px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;background:var(--chip-bg);border:1px solid var(--border);color:var(--sub);cursor:pointer;transition:all .18s;white-space:nowrap;user-select:none;}
.chip:hover{border-color:var(--accent-glow);color:var(--text);}
.chip.active{background:var(--accent-dim);border-color:rgba(255,107,53,.6);color:var(--accent);}
.count-bar{padding:14px 16px 4px;font-size:11px;color:var(--muted);letter-spacing:.05em;max-width:600px;margin:0 auto;}
.count-bar strong{color:var(--accent);font-weight:700;}
.grid{display:flex;flex-direction:column;gap:10px;padding:10px 16px 48px;max-width:600px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 20px 16px;transition:border-color .2s,transform .2s,box-shadow .2s;opacity:0;transform:translateY(10px);animation:up .4s ease forwards;}
.card:hover{border-color:rgba(255,107,53,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
@keyframes up{to{opacity:1;transform:translateY(0);}}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;margin-top:2px;}
.tag{font-size:9px;font-weight:800;letter-spacing:.05em;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.tag-spot{background:rgba(255,209,102,.12);color:var(--yellow);border:1px solid rgba(255,209,102,.3);}
.tag-fixed{background:rgba(76,201,240,.1);color:var(--blue);border:1px solid rgba(76,201,240,.25);}
.tag-day{background:rgba(255,107,53,.12);color:var(--accent);border:1px solid rgba(255,107,53,.3);}
.tag-month{background:rgba(76,201,240,.1);color:var(--blue);border:1px solid rgba(76,201,240,.25);}
.tag-hour{background:rgba(6,214,160,.1);color:var(--green);border:1px solid rgba(6,214,160,.25);}
.tag-com{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.25);}
.tag-elec{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25);}
.card-title{font-size:14px;font-weight:700;line-height:1.45;flex:1;}
.reward{display:flex;align-items:center;gap:10px;background:linear-gradient(115deg,rgba(255,107,53,.07),rgba(255,209,102,.04));border:1px solid rgba(255,107,53,.16);border-radius:10px;padding:9px 14px;margin-bottom:12px;}
.reward-label{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--muted);white-space:nowrap;}
.reward-value{font-size:17px;font-weight:900;color:var(--accent);letter-spacing:-.01em;}
.meta{display:flex;flex-wrap:wrap;gap:10px;}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#a0a0c0;}
.meta-item svg{width:12px;height:12px;opacity:.5;flex-shrink:0;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty p{font-size:13px;margin-top:8px;}
.updated{text-align:center;font-size:10px;color:var(--muted);padding:12px;letter-spacing:.05em;}
.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 20px;color:var(--muted);font-size:12px;}
.dots{display:flex;gap:5px;}
.dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.2s ease infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

.apply-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;width:100%;padding:10px;border-radius:10px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:opacity .18s;letter-spacing:.04em;}
.apply-btn:hover{opacity:.85;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal{background:#1a1a28;border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:480px;position:relative;animation:up .25s ease;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:4px;}
.modal .anken-name{font-size:12px;color:var(--accent);margin-bottom:20px;}
.modal label{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.06em;margin-bottom:5px;}
.modal input,.modal textarea{width:100%;background:#0f0f1c;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:14px;outline:none;transition:border-color .18s;}
.modal input:focus,.modal textarea:focus{border-color:var(--accent-glow);}
.modal textarea{height:90px;resize:none;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
.modal-submit{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .18s;margin-top:4px;}
.modal-submit:hover{opacity:.85;}
.modal-submit:disabled{opacity:.5;cursor:not-allowed;}
.success-msg{text-align:center;padding:20px 0;color:var(--green);}
.success-msg p{font-size:13px;color:var(--sub);margin-top:8px;}

.expand-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:10px;padding:8px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.05em;}
.expand-btn:hover{border-color:var(--accent-glow);color:var(--text);}
.expand-btn .plus{display:inline-block;width:14px;height:14px;line-height:14px;text-align:center;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:900;transition:transform .25s;}
.card.expanded .expand-btn .plus{transform:rotate(45deg);}
.details{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.card.expanded .details{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.detail-row{display:flex;gap:10px;margin-bottom:9px;font-size:12px;line-height:1.55;}
.detail-row:last-child{margin-bottom:0;}
.detail-label{flex-shrink:0;width:72px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.05em;padding-top:1px;}
.detail-value{flex:1;color:#c8c8e0;}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-label"><span></span>LIVE OPENINGS</div>
  <h1>現在の<em>募集案件</em>一覧</h1>
  <p>BUDDYON — 最新の案件をご確認ください</p>
</div>
<div class="filters">
  <div class="filter-row">
    <span class="filter-label">種別</span>
    <div class="chips" id="filter-type">
      <div class="chip active" data-val="">すべて</div>
      <div class="chip" data-val="固定">📌 固定</div>
      <div class="chip" data-val="スポット">⚡ スポット</div>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">報酬</span>
    <div class="chips" id="filter-pay">
      <div class="chip active" data-val="">すべて</div>
      <div class="chip" data-val="日給">日給</div>
      <div class="chip" data-val="月給">月給</div>
      <div class="chip" data-val="時給">時給</div>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">業種</span>
    <div class="chips" id="filter-industry">
      <div class="chip active" data-val="">すべて</div>
      <div class="chip" data-val="通信">📱 通信</div>
      <div class="chip" data-val="家電">🏬 家電</div>
    </div>
  </div>
</div>
<div class="count-bar" id="count-bar"></div>
<div class="grid" id="grid">
  <div class="loading">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <span>読み込み中...</span>
  </div>
</div>
<div class="updated" id="updated-at"></div>

<script>
let allItems = [];
let filters = {type:'', pay:'', industry:''};

function fmtReward(min,max,type){
  const unit=type==='日給'?'円／日':type==='月給'?'円／月':'円／時';
  const n=v=>v?Number(v).toLocaleString('ja-JP'):null;
  if(!max&&!min)return '要相談';
  if(!min||Number(min)===Number(max))return n(max)+unit;
  return n(min)+'〜'+n(max)+unit;
}
function payClass(t){return t==='日給'?'tag-day':t==='月給'?'tag-month':'tag-hour';}
function typeClass(t){return t==='スポット'?'tag-spot':'tag-fixed';}
function indClass(i){return i==='家電'?'tag-elec':'tag-com';}
const locIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const calIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

function renderCards(){
  const grid=document.getElementById('grid');
  const countBar=document.getElementById('count-bar');
  const filtered=allItems.filter(d=>{
    if(filters.type&&d.ankenType!==filters.type)return false;
    if(filters.pay&&d.tankaPriceType!==filters.pay)return false;
    if(filters.industry&&d.industry!==filters.industry)return false;
    return true;
  });
  if(!filtered.length){
    grid.innerHTML=`<div class="empty">😶 該当案件なし<p>フィルターを変更してみてください</p></div>`;
    countBar.innerHTML='';
    return;
  }
  countBar.innerHTML=`<strong>${filtered.length}件</strong> 表示中`;
  grid.innerHTML=filtered.map((d,i)=>`
<div class="card" style="animation-delay:${i*0.07}s">
  <div class="card-top">
    <div class="tags">
      ${d.ankenType?`<span class="tag ${typeClass(d.ankenType)}">${d.ankenType}</span>`:''}
      ${d.tankaPriceType?`<span class="tag ${payClass(d.tankaPriceType)}">${d.tankaPriceType}</span>`:''}
      ${d.industry?`<span class="tag ${indClass(d.industry)}">${d.industry}</span>`:''}
    </div>
    <div class="card-title">${d.ankenName||'—'}</div>
  </div>
  <div class="reward">
    <span class="reward-label">報酬</span>
    <span class="reward-value">${d.tankaDisplay||fmtReward(d.tankaPriceMin,d.tankaPriceMax,d.tankaPriceType)}</span>
  </div>
  <div class="meta">
    <div class="meta-item">${locIcon}<span>${d.kinmuChi||'要相談'}</span></div>
    <div class="meta-item">${calIcon}<span>${d.kaishi||'随時'}</span></div>
  </div>
  ${(d.skillYoken||d.kadoNissu||d.kadoJikan||d.mentanFlow||d.kinmuChi)?`
  <button class="expand-btn" onclick="toggleDetails(this)"><span class="plus">+</span><span class="expand-label">詳細を見る</span></button>
  <div class="details">
    ${d.kinmuChi?`<div class="detail-row"><div class="detail-label">勤務地</div><div class="detail-value">${d.kinmuChi}</div></div>`:''}
    ${d.skillYoken?`<div class="detail-row"><div class="detail-label">スキル</div><div class="detail-value">${d.skillYoken}</div></div>`:''}
    ${d.kadoNissu?`<div class="detail-row"><div class="detail-label">稼働日数</div><div class="detail-value">${d.kadoNissu}</div></div>`:''}
    ${d.kadoJikan?`<div class="detail-row"><div class="detail-label">稼働時間</div><div class="detail-value">${d.kadoJikan}</div></div>`:''}
    ${d.mentanFlow?`<div class="detail-row"><div class="detail-label">面談</div><div class="detail-value">${d.mentanFlow}</div></div>`:''}
  </div>`:''}
  <button class="apply-btn" onclick="openModal('${d.ankenName.replace(/'/g,"\\'")}')">📮 この案件に応募する</button>
</div>`).join('');
}

['filter-type','filter-pay','filter-industry'].forEach((id,idx)=>{
  const key=['type','pay','industry'][idx];
  document.getElementById(id).addEventListener('click',e=>{
    const chip=e.target.closest('.chip');
    if(!chip)return;
    document.querySelectorAll(`#${id} .chip`).forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    filters[key]=chip.dataset.val;
    renderCards();
  });
});

function toggleDetails(btn){
  const card=btn.closest('.card');
  card.classList.toggle('expanded');
  btn.querySelector('.expand-label').textContent=card.classList.contains('expanded')?'閉じる':'詳細を見る';
}

// 同一オリジン(anken.buddyon.net)からdata.jsonを取得 → CORSなし
fetch('/data.json?t=' + Date.now())
  .then(r => r.json())
  .then(json => {
    // Wix APIレスポンス形式（dataItems）とシンプル形式（items）の両方に対応
    if(json.dataItems) {
      allItems = json.dataItems.map(i => i.data).filter(Boolean);
    } else {
      allItems = json.items || [];
    }
    renderCards();
    const updated = json.updated || json._updatedDate;
    if(updated){
      const d = new Date(updated);
      document.getElementById('updated-at').textContent =
        '最終更新: ' + d.toLocaleString('ja-JP', {timeZone:'Asia/Tokyo'});
    }
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div class="empty">⚠️ データを取得できませんでした</div>';
  });

const WEBHOOK_URL = 'https://hook.us2.make.com/ltg8hglv57s9iw556aqhrh9kl4r3th7v';

function openModal(ankenName){
  document.getElementById('modal-anken-name').textContent = ankenName;
  document.getElementById('modal-overlay').dataset.anken = ankenName;
  document.getElementById('modal-content').style.display='block';
  document.getElementById('success-msg').style.display='none';
  document.getElementById('input-name').value='';
  document.getElementById('input-phone').value='';
  document.getElementById('input-email').value='';
  document.getElementById('input-pr').value='';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow='';
}

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

async function submitOubo(){
  const name = document.getElementById('input-name').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  const email = document.getElementById('input-email').value.trim();
  const pr = document.getElementById('input-pr').value.trim();
  const ankenName = document.getElementById('modal-overlay').dataset.anken;
  if(!name){ alert('お名前を入力してください'); return; }
  if(!phone){ alert('電話番号を入力してください'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  try {
    await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, phone, email, pr, ankenName})
    });
    document.getElementById('modal-content').style.display='none';
    document.getElementById('success-msg').style.display='block';
    setTimeout(closeModal, 2500);
  } catch(e) {
    alert('送信に失敗しました。時間をおいてお試しください。');
    btn.disabled = false;
    btn.textContent = '応募を送信する';
  }
}

</script>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>📝 応募する</h2>
    <p class="anken-name" id="modal-anken-name"></p>
    <div id="modal-content">
      <label>お名前 *</label>
      <input type="text" id="input-name" placeholder="山田 太郎">
      <label>電話番号 *</label>
      <input type="tel" id="input-phone" placeholder="090-0000-0000">
      <label>メールアドレス</label>
      <input type="email" id="input-email" placeholder="example@email.com">
      <label>自己PR・経験など</label>
      <textarea id="input-pr" placeholder="これまでの経験や意気込みをご記入ください"></textarea>
      <button class="modal-submit" id="submit-btn" onclick="submitOubo()">応募を送信する</button>
    </div>
    <div id="success-msg" class="success-msg" style="display:none">
      <div style="font-size:36px">✅</div>
      <p>応募を受け付けました！<br>担当者よりご連絡いたします。</p>
    </div>
  </div>
</div>

</body>
</html>
