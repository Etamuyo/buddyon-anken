name: Sync Wix CMS to data.json

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Wix CMS data
        run: |
          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: ${{ secrets.WIX_API_KEY }}" \
            -H "wix-site-id: ${{ secrets.WIX_SITE_ID }}" \
            -H "Content-Type: application/json" \
            -d '{"dataCollectionId":"AnkenList","query":{"paging":{"limit":100}}}' \
            "https://www.wixapis.com/wix-data/v2/items/query")

          # エラーチェック: dataItemsが含まれない場合は中断
          if echo "$RESPONSE" | grep -q '"dataItems"'; then
            echo "$RESPONSE" > data.json
            echo "✅ 取得成功: $(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d["dataItems"]), "件")')"
          else
            echo "❌ APIエラー。既存のdata.jsonを保持します。"
            echo "Response: $RESPONSE"
            exit 0
          fi

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions@buddyon.net"
          git config user.name "GitHub Actions"
          git add data.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "Sync: Wix CMS $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
